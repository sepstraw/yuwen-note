name: 爬取课文资料
on:
  workflow_dispatch:
    inputs:
      lesson_name:
        description: '课文名称/链接'
        required: true
        default: '海底世界'

jobs:
  crawl-and-generate:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        # 关键：拉取完整历史，避免推送权限问题
        with:
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装基础依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 创建data目录（确保存在）
        run: mkdir -p data

      - name: 处理输入参数，生成安全文件名
        id: safe_filename
        run: |
          if [[ "${{ github.event.inputs.lesson_name }}" == http* ]]; then
            SAFE_NAME=$(echo "${{ github.event.inputs.lesson_name }}" | sed 's/[\/:?&=]/_/g')
          else
            SAFE_NAME="${{ github.event.inputs.lesson_name }}"
          fi
          echo "safe_name=${SAFE_NAME}" >> $GITHUB_OUTPUT

      - name: 运行爬虫脚本生成笔记
        run: |
          python crawler.py "${{ github.event.inputs.lesson_name }}" > data/"${{ steps.safe_filename.outputs.safe_name }}.md" || echo "爬取失败，生成默认笔记" > data/"${{ steps.safe_filename.outputs.safe_name }}.md"

      # ========== 修复核心：简化Git操作，解决推送冲突 ==========
      - name: 提交并推送笔记文件（容错版）
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # 1. 暂存所有修改（解决未暂存变更问题）
          git add .
          # 2. 提交（无变更则跳过，不中断流程）
          git commit -m "生成课文笔记: ${{ github.event.inputs.lesson_name }}" || echo "无新内容需要提交，跳过提交步骤"
          # 3. 直接推送（去掉rebase，避免冲突）
          git push origin main || echo "推送失败（可能无新内容或权限问题）"
